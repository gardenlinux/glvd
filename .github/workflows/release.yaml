name: Release
on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Determine Version to Release
        id: version
        run: echo "VERSION=$(date --utc +%Y.%m.%d)" >> $GITHUB_ENV

      - name: Set Version
        run: echo $VERSION > version.txt

      - name: Update image tags to release
        run: ./scripts/update-image-tags.py $VERSION

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version.txt to branch
        run: |
          git checkout -b release-version-${VERSION}
          git add version.txt deployment deploy-k8s.sh
          git commit -m "chore: set version to ${VERSION}"
          git tag $VERSION

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Compose Up
        run: |
          docker compose --file deployment/compose/compose.yaml up --detach

      - name: Wait for GLVD to be up
        run: |
          # Wait for HTTP 200 and status: UP in response body
          until [ "$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health)" = "200" ] && \
                [ "$(curl -s http://localhost:8080/actuator/health | jq -r .status)" = "UP" ]; do
            sleep 1
          done

      - run: docker ps

      - name: Run API Tests
        run: bru run --env ci --reporter-html results.html
        working-directory: api-tests

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: api-tests/results.html

      - name: Push tag for release
        run: |
          git push --tags origin release-version-${VERSION}

      - name: Create Release
        run: |
          gh release create ${VERSION} --title "Release ${VERSION}" --notes "Release ${VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
